<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Action card fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        color: #f1f1f1;
        background: #111111;
        font: 1rem/1.4 system-ui, sans-serif;
      }

      main {
        padding: 5rem 1rem 1rem;
      }
    </style>
    <script>
      window.browser = {
        runtime: {
          getURL() {
            return 'data:text/javascript,void%200';
          },
          getManifest() {
            return { manifest_version: 3, version: '2.0.13' };
          },
          onMessage: {
            addListener(listener) {
              window.sendExtensionMessage = listener;
            },
          },
        },
      };
    </script>
    <script src="/firefox-extension/content.js"></script>
  </head>
  <body>
    <main>
      <h1>YouTube page remains visible</h1>
      <p>The extension action card should cover only its own compact area.</p>
    </main>
    <script>
      window.sendExtensionMessage({ type: 'toggleActionCard' });
    </script>
  </body>
</html>
